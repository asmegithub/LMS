server:
  # Use 8080 (default); 808 can cause BindException: Permission denied on some systems
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: LMS
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    url: jdbc:mysql://localhost:3306/LMS?createDatabaseIfNotExist=true
    username: root
    password: mysql--2123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:379367023334-qllaif84kf0361ndmcm02glkc9c5km9f.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope: openid,profile,email
        provider:
          google:
            issuer-uri: https://accounts.google.com

app:
  jwt:
    secret: ${JWT_SECRET:ae22d8bb7896df828b652829e9db5655d49555b6dcf473d581f866dc4f94909d}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
  # Frontend URL where user lands after OAuth (with ?accessToken=...&refreshToken=...)
  # Frontend on 8081 → use http://localhost:8081/auth
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8081/auth}
  cors:
    # Must include frontend origin so browser allows the redirect (frontend on 8081)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081}
  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:uploads}
  chapa:
    secret-key: ${CHAPA_SECRET_KEY:}
    # Frontend base URL for return/cancel (e.g. http://localhost:8081)
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:8081}
    # Backend base URL for Chapa callback (e.g. http://localhost:8080)
    callback-base-url: ${CHAPA_CALLBACK_BASE_URL:http://localhost:8080}